<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botko - Karma Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 2.4rem;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 40px;
        }
        .chart-wrapper {
            background: #16213e;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .chart-wrapper h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: #ccc;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Botko Karma</h1>
        <p class="subtitle">{{ total_karma }} karma given out so far</p>

        <div class="chart-wrapper">
            <h2>Karma per month</h2>
            <canvas id="chart"></canvas>
        </div>
    </div>

    <script>
        const labels = {{ labels_json|safe }};
        const counts = {{ counts_json|safe }};
        const cumulative = {{ cumulative_json|safe }};

        const barColor = "rgba(99, 102, 241, 0.8)";
        const lineColor = "rgba(244, 114, 182, 0.9)";
        const gridColor = "rgba(255, 255, 255, 0.06)";
        const tickColor = "#888";

        new Chart(document.getElementById("chart"), {
            type: "bar",
            data: {
                labels,
                datasets: [
                    {
                        label: "Karma",
                        data: counts,
                        backgroundColor: barColor,
                        borderRadius: 4,
                        yAxisID: "y",
                        order: 1,
                    },
                    {
                        label: "Cumulative",
                        data: cumulative,
                        type: "line",
                        borderColor: lineColor,
                        borderWidth: 2,
                        fill: false,
                        tension: 0.3,
                        pointRadius: 2,
                        yAxisID: "y1",
                        order: 0,
                    },
                ],
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: tickColor } } },
                scales: {
                    x: { ticks: { color: tickColor, maxRotation: 45 }, grid: { display: false } },
                    y: { position: "left", ticks: { color: tickColor }, grid: { color: gridColor }, beginAtZero: true, title: { display: true, text: "Per month", color: tickColor } },
                    y1: { position: "right", ticks: { color: tickColor }, grid: { display: false }, beginAtZero: true, title: { display: true, text: "Cumulative", color: tickColor } },
                },
            },
        });
    </script>
</body>
</html>
