<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botko - {% block title %}Karma Stats{% endblock %}</title>
    {% block extra_head %}{% endblock %}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 2.4rem;
            margin-bottom: 8px;
            color: #fff;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 24px;
        }
        nav {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        nav a {
            color: #888;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: background 0.2s, color 0.2s;
        }
        nav a:hover, nav a.active {
            color: #fff;
            background: #16213e;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: left;
        }
        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 16px;
            color: #ccc;
            font-weight: 500;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        td, th {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        th {
            color: #888;
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .rank { color: #888; width: 40px; }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            vertical-align: middle;
        }
        .user-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .count {
            font-weight: 600;
            color: rgba(99, 102, 241, 0.9);
        }
        .post-card {
            background: #16213e;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: left;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .post-meta {
            color: #888;
            font-size: 0.85rem;
        }
        .post-text {
            line-height: 1.6;
            margin-bottom: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .post-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            margin-top: 8px;
            margin-bottom: 8px;
        }
        .emoji-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }
        .emoji-badge {
            display: inline-block;
            background: #0f3460;
            border-radius: 12px;
            padding: 4px 10px;
            font-size: 0.85rem;
        }
        .karma-count-badge {
            background: rgba(99, 102, 241, 0.2);
            color: rgba(99, 102, 241, 0.9);
            font-weight: 600;
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="container">
        <h1>Botko Karma</h1>
        <nav>
            <a href="/" {% if request.path == "/" %}class="active"{% endif %}>Chart</a>
            <a href="/receivers/" {% if request.path == "/receivers/" %}class="active"{% endif %}>Top Receivers</a>
            <a href="/givers/" {% if request.path == "/givers/" %}class="active"{% endif %}>Top Givers</a>
            <a href="/posts/" {% if request.path == "/posts/" %}class="active"{% endif %}>Top Posts</a>
        </nav>
        {% block content %}{% endblock %}
    </div>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
